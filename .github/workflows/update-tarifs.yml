name: Mise à jour hebdomadaire des tarifs

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape tarifs
        id: scrape
        run: python scripts/scrape_tarifs.py

      - name: Vérifier les changements
        id: changes
        run: |
          git diff --quiet tarifs.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push si changement
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u "+%d/%m/%Y")
          git add tarifs.json
          git commit -m "chore: mise à jour tarifs électricité — $DATE"
          git push

      - name: Alerte si échec
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Scraping tarifs échoué — ${new Date().toLocaleDateString('fr-FR')}`,
              body: `Le workflow de mise à jour des tarifs a échoué.\n\n[Voir les logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\nVérifiez que les sites sources (Selectra, Kelwatt) n'ont pas modifié leur structure HTML.`,
              labels: ['bug', 'automated']
            });
